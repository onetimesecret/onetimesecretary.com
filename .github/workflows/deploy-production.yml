# .github/workflows/deploy-production.yml
#
# Build and deploy to BunnyCDN on pushes to main.
#
# Required secrets:
#   STORAGE_NAME, STORAGE_DESTINATION, STORAGE_PASSWORD_RW, STORAGE_KEY
#   PULL_ZONE_ID, BUNNY_API_KEY
#
# Optional secrets (Sentry):
#   SENTRY_DSN, SENTRY_ORG, SENTRY_PROJECT, SENTRY_AUTH_TOKEN

name: (production) Build and Deploy to BunnyCDN

concurrency:
  group: ${{ github.workflow }}-production
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    concurrency: production

    env:
      PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.11
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "Deploying to ${VITE_BASE_URL}"
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: pnpm build

      - name: Upload to BunnyCDN Storage
        uses: ayeressian/bunnycdn-storage-deploy@v2.2.5
        with:
          source: "dist"
          accessKey: "${{ secrets.STORAGE_KEY }}"
          destination: "${{ secrets.STORAGE_DESTINATION }}"
          storageZoneName: "${{ secrets.STORAGE_NAME }}"
          storagePassword: "${{ secrets.STORAGE_PASSWORD_RW }}"
          pullZoneId: "${{ secrets.PULL_ZONE_ID }}"
          upload: "true"
          remove: "false"
          purgePullZone: "false"

      - name: Wait for storage replication
        run: |
          echo "Waiting 10 seconds for BunnyCDN storage replication..."
          sleep 10

      - name: Purge CDN cache
        run: |
          echo "Purging BunnyCDN pull zone cache..."
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.bunny.net/pullzone/${{ secrets.PULL_ZONE_ID }}/purgeCache" \
            -H "AccessKey: ${{ secrets.BUNNY_API_KEY }}" \
            -H "Content-Type: application/json")

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          if [[ "$http_code" -ge 200 && "$http_code" -lt 300 ]]; then
            echo "Cache purge completed successfully (HTTP $http_code)"
          else
            echo "Cache purge failed with HTTP $http_code"
            echo "Response: $body"
            exit 1
          fi
